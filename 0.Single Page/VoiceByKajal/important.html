<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box
    }

    body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        font-family: sans-serif;
        color: #fff;
    }

    .card {
        background: #fff;
        color: #333;
        padding: 30px;
        border-radius: 25px;
        text-align: center;
        max-width: 420px;
        width: 100%;
        box-shadow: 0 15px 40px rgba(0, 0, 0, .3);
    }

    .message {
        background: #fff4e6;
        border-left: 6px solid #ff6b35;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-weight: bold;
        color: #c0392b;
    }

    .timer {
        font-size: 60px;
        font-weight: 900;
        margin: 10px 0;
        font-family: monospace;
    }

    .progress {
        height: 8px;
        background: #ddd;
        border-radius: 20px;
        overflow: hidden;
    }

    .bar {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #ff9a3c, #ff6b35);
        transition: width 1s linear;
    }

    .small {
        margin-top: 10px;
        font-size: 14px;
        color: #555;
    }
</style>
</head>

<body>

    <div class="card">

        <div class="message">
            <h1>✨ IMPORTANT MESSAGE ✨</h1>
            <p>wait 30 seconds</p>

            <br>

        </div>

        <div class="timer" id="timer">30</div>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <div class="small">Redirecting soon...</div>

    </div>

    <script>

        let time = 30
        const timer = document.getElementById("timer")
        const bar = document.getElementById("bar")

        const interval = setInterval(() => {

            time--

            timer.textContent = time
            bar.style.width = (time / 30) * 100 + "%"

            if (time <= 0) {

                clearInterval(interval)

                window.location.href = "/love/index.html"

            }

        }, 1000)

    </script>

</body>
