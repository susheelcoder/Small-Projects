<!DOCTYPE html>
<html>

<head>
  <title>PDF Preview</title>
</head>

<body>

  <h2>Generate PDF (Open in Browser)</h2>

  <p id="content">
    Lorem ipsum dolor sit amet consectetur adipisicing elit.
  </p>

  <button onclick="generatePDF()">Open PDF</button>

  <script>
function generatePDF() {
  const name = "Test Name " + Date.now();
  const about = document.getElementById("content").innerText;

  fetch("/test.pdf", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, about })
  })
  .then(res => res.blob())
  .then(blob => {
    const url = window.URL.createObjectURL(blob + "#" + Date.now());
    window.open(url, "_blank");
  });
}
  </script>

</body>

</html>
